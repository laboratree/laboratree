name: laboratree

# Polyglot persistence — each store in its own dedicated container.
# Blobs are stored on a local volume (./data/blobs) behind the BlobStore interface.

services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-laboratree}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-laboratree}
      POSTGRES_DB: ${POSTGRES_DB:-laboratree}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-laboratree}"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  neo4j:
    image: neo4j:5-community
    environment:
      NEO4J_AUTH: ${NEO4J_USER:-neo4j}/${NEO4J_PASSWORD:-laboratree}
      NEO4J_PLUGINS: '["apoc"]'
    ports:
      - "${NEO4J_HTTP_PORT:-7474}:7474"   # browser
      - "${NEO4J_BOLT_PORT:-7687}:7687"   # bolt
    volumes:
      - neo4j_data:/data
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:7474 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10

  mongodb:
    image: mongo:7
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_USER:-laboratree}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD:-laboratree}
    ports:
      - "${MONGO_PORT:-27017}:27017"
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 10

  api:
    build:
      context: ..
      dockerfile: infra/api.Dockerfile
    env_file: ../.env
    environment:
      # in-container hostnames override the .env localhost defaults
      POSTGRES_HOST: postgres
      REDIS_HOST: redis
      NEO4J_URI: bolt://neo4j:7687
      MONGO_HOST: mongodb
      BLOB_LOCAL_ROOT: /data/blobs
    ports:
      - "${API_PORT:-8000}:8000"
    volumes:
      - ../data/blobs:/data/blobs
    depends_on:
      postgres: { condition: service_healthy }
      redis: { condition: service_healthy }
      neo4j: { condition: service_healthy }
      mongodb: { condition: service_healthy }

  worker:
    build:
      context: ..
      dockerfile: infra/api.Dockerfile
    command: ["uv", "run", "celery", "-A", "laboratree.core.jobs.celery_app", "worker", "--loglevel=info"]
    env_file: ../.env
    environment:
      POSTGRES_HOST: postgres
      REDIS_HOST: redis
      NEO4J_URI: bolt://neo4j:7687
      MONGO_HOST: mongodb
      BLOB_LOCAL_ROOT: /data/blobs
    volumes:
      - ../data/blobs:/data/blobs
      # docker socket so the worker can launch sandbox containers for code execution
      - /var/run/docker.sock:/var/run/docker.sock
    depends_on:
      - api

  web:
    build:
      context: ../frontend
      dockerfile: Dockerfile
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:${API_PORT:-8000}
    ports:
      - "${WEB_PORT:-3000}:3000"
    depends_on:
      - api

volumes:
  postgres_data:
  redis_data:
  neo4j_data:
  mongo_data:
