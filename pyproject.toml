# uv workspace root (virtual — no package of its own).
# Members are the Python projects in the monorepo.

[tool.uv.workspace]
members = ["backend", "packages/plugin-sdk", "mcp-servers/search-mcp", "mcp-servers/ocr-mcp"]

[tool.uv.sources]
laboratree-plugin-sdk = { workspace = true }
laboratree-api = { workspace = true }

# 120 matches how the codebase is actually written (390 of 406 "long" lines were 101–120 cols);
# the formatter owns wrapping, this is the lint ceiling.
[tool.ruff]
line-length = 120
target-version = "py312"

[tool.ruff.lint]
select = ["E", "F", "I", "UP", "B"]

# FastAPI's dependency-injection idiom puts callables (Depends/File/Query/…) in argument defaults
# on purpose — not the B008 anti-pattern.
[tool.ruff.lint.flake8-bugbear]
extend-immutable-calls = [
    "fastapi.Depends", "fastapi.File", "fastapi.Query", "fastapi.Form", "fastapi.Body",
    "fastapi.Path", "fastapi.Header", "fastapi.Cookie",
]

[tool.pytest.ini_options]
addopts = "-q"
testpaths = ["backend/tests"]
